  <rect x="0" y="0" width="1120" height="1240" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="21" font-weight="bold" fill="#0f172a">AVSA — ETAP Río Almora · OT Network, Current State (July 2026)</text>
  <text x="40" y="68" font-size="13" fill="#64748b">Purdue-model view · fictional scenario for portfolio demonstration · observations AO-1…AO-5 feed the IEC 62443-3-2 risk assessment</text>

  <!-- Legend -->
  <rect x="845" y="88" width="230" height="118" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="857" y="108" font-size="12" font-weight="bold" fill="#334155">Legend</text>
  <line x1="857" y1="124" x2="905" y2="124" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="912" y="128" font-size="11" fill="#334155">risk-relevant path</text>
  <rect x="857" y="138" width="34" height="16" rx="3" fill="#dc2626"/>
  <text x="864" y="150" font-size="10" font-weight="bold" fill="#ffffff">AO-n</text>
  <text x="898" y="150" font-size="11" fill="#334155">architectural observation</text>
  <line x1="857" y1="170" x2="905" y2="170" stroke="#d97706" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="912" y="174" font-size="11" fill="#334155">flat / unsegmented zone</text>
  <line x1="857" y1="192" x2="905" y2="192" stroke="#334155" stroke-width="2"/>
  <text x="912" y="196" font-size="11" fill="#334155">normal traffic path</text>

  <!-- Purdue level labels (left margin) -->
  <text x="16" y="152" font-size="11" font-weight="bold" fill="#64748b">L4–5</text>
  <text x="16" y="278" font-size="11" font-weight="bold" fill="#64748b">L3.5</text>
  <text x="14" y="292" font-size="10" font-weight="bold" fill="#dc2626">(absent)</text>
  <text x="16" y="452" font-size="11" font-weight="bold" fill="#64748b">L3</text>
  <text x="16" y="590" font-size="11" font-weight="bold" fill="#64748b">L2</text>
  <text x="16" y="808" font-size="11" font-weight="bold" fill="#64748b">L1</text>
  <text x="16" y="958" font-size="11" font-weight="bold" fill="#64748b">L0</text>

  <!-- Enterprise band L4-5 -->
  <rect x="60" y="100" width="760" height="110" rx="10" fill="#eef2f7" stroke="#5b7a9d"/>
  <text x="76" y="124" font-size="14" font-weight="bold" fill="#33506e">Levels 4–5 · Corporate LAN 10.20.0.0/16</text>
  <rect x="90" y="138" width="380" height="56" rx="6" fill="#ffffff" stroke="#5b7a9d"/>
  <text x="280" y="162" font-size="12.5" fill="#1e293b" text-anchor="middle">Billing · ERP · GIS · Email</text>
  <text x="280" y="180" font-size="11" fill="#64748b" text-anchor="middle">(hit by ransomware, Nov 2025 — plant unaffected)</text>
  <rect x="510" y="138" width="290" height="56" rx="6" fill="#ffffff" stroke="#5b7a9d"/>
  <text x="655" y="162" font-size="12.5" fill="#1e293b" text-anchor="middle">Corporate reporting server</text>
  <text x="655" y="180" font-size="11" fill="#64748b" text-anchor="middle">receives historian data</text>

  <!-- Nortec box -->
  <rect x="110" y="246" width="250" height="64" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="235" y="272" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Nortec Automatización S.L.</text>
  <text x="235" y="290" font-size="11" fill="#64748b" text-anchor="middle">remote support engineers (external)</text>
  <text x="112" y="330" font-size="11" font-weight="bold" fill="#dc2626">AO-3: shared VPN account · standing access · no MFA</text>

  <!-- Firewall -->
  <rect x="430" y="246" width="260" height="64" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="1.5"/>
  <text x="560" y="272" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">Perimeter firewall</text>
  <text x="560" y="290" font-size="11" fill="#4b5563" text-anchor="middle">single · IT-managed</text>
  <text x="560" y="330" font-size="11" font-weight="bold" fill="#dc2626" text-anchor="middle">AO-1: no OT DMZ — Level 3.5 does not exist</text>

  <!-- Enterprise <-> firewall, firewall <-> plant -->
  <line x1="560" y1="210" x2="560" y2="244" stroke="#334155" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="560" y1="310" x2="560" y2="348" stroke="#334155" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Nortec -> firewall (risk) -->
  <line x1="360" y1="278" x2="426" y2="278" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>

  <!-- Flat plant LAN container -->
  <rect x="60" y="350" width="760" height="330" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="76" y="376" font-size="14" font-weight="bold" fill="#92400e">Plant control LAN 192.168.100.0/24 — FLAT (AO-2): Levels 3 and 2 share one segment</text>

  <!-- L3 row -->
  <text x="76" y="404" font-size="12" font-weight="bold" fill="#334155">Level 3 · Site operations</text>
  <rect x="84" y="414" width="210" height="86" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="252" y="410" width="38" height="17" rx="3" fill="#dc2626"/>
  <text x="271" y="422.5" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">AO-1</text>
  <text x="189" y="446" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Process historian</text>
  <text x="189" y="466" font-size="11" fill="#b91c1c" text-anchor="middle">dual-homed → corporate</text>
  <text x="189" y="482" font-size="11" fill="#b91c1c" text-anchor="middle">(2nd NIC bypasses firewall)</text>

  <rect x="312" y="414" width="210" height="86" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="480" y="410" width="38" height="17" rx="3" fill="#dc2626"/>
  <text x="499" y="422.5" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">AO-5</text>
  <text x="417" y="446" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Engineering workstation</text>
  <text x="417" y="466" font-size="11" fill="#b91c1c" text-anchor="middle">also used for email &amp; web</text>
  <text x="417" y="482" font-size="11" fill="#64748b" text-anchor="middle">PLC programming authority</text>

  <rect x="540" y="414" width="210" height="86" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="645" y="446" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Field engineering laptop</text>
  <text x="645" y="466" font-size="11" fill="#64748b" text-anchor="middle">moves between plant,</text>
  <text x="645" y="482" font-size="11" fill="#64748b" text-anchor="middle">remote sites &amp; home · ad-hoc backups</text>

  <!-- L2 row -->
  <text x="76" y="540" font-size="12" font-weight="bold" fill="#334155">Level 2 · Supervision</text>
  <rect x="84" y="550" width="210" height="96" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="189" y="586" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">SCADA servers ×2</text>
  <text x="189" y="606" font-size="11" fill="#64748b" text-anchor="middle">redundant pair</text>
  <text x="189" y="622" font-size="11" fill="#64748b" text-anchor="middle">commercial platform</text>

  <rect x="312" y="550" width="210" height="96" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="417" y="586" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Operator workstations ×4</text>
  <text x="417" y="606" font-size="11" fill="#64748b" text-anchor="middle">24/7 control room</text>

  <rect x="540" y="550" width="250" height="96" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="748" y="546" width="38" height="17" rx="3" fill="#dc2626"/>
  <text x="767" y="558.5" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">AO-4</text>
  <text x="665" y="586" font-size="12.5" font-weight="bold" fill="#1e293b" text-anchor="middle">Panel HMIs ×6</text>
  <text x="665" y="606" font-size="11" fill="#b91c1c" text-anchor="middle">2 × Windows 7</text>
  <text x="665" y="622" font-size="11" fill="#64748b" text-anchor="middle">patching vendor-locked</text>

  <!-- Dual-homed historian path (around firewall) -->
  <path d="M 84 457 L 72 457 L 72 228 L 655 228 L 655 196" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="390" y="222" font-size="11" font-weight="bold" fill="#dc2626">historian 2nd NIC — replication bypasses the firewall (AO-1)</text>

  <!-- Plant LAN -> L1 -->
  <line x1="440" y1="680" x2="440" y2="728" stroke="#334155" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="452" y="710" font-size="11" fill="#475569">control &amp; supervision — Profinet / OPC UA</text>

  <!-- L1 band -->
  <rect x="60" y="730" width="760" height="150" rx="10" fill="#ecfdf5" stroke="#059669"/>
  <text x="76" y="754" font-size="14" font-weight="bold" fill="#065f46">Level 1 · Control — 24 × Siemens S7-1500 (plant)</text>
  <rect x="80" y="768" width="136" height="96" rx="6" fill="#ffffff" stroke="#059669"/>
  <text x="148" y="798" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">PA-1 Intake</text>
  <text x="148" y="818" font-size="11" fill="#475569" text-anchor="middle">3 PLCs</text>
  <rect x="228" y="768" width="136" height="96" rx="6" fill="#ffffff" stroke="#059669"/>
  <text x="296" y="798" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">PA-2 Coagulation</text>
  <text x="296" y="818" font-size="11" fill="#475569" text-anchor="middle">4 PLCs</text>
  <rect x="376" y="768" width="136" height="96" rx="6" fill="#ffffff" stroke="#059669"/>
  <text x="444" y="798" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">PA-3 Filtration</text>
  <text x="444" y="818" font-size="11" fill="#475569" text-anchor="middle">6 PLCs</text>
  <rect x="524" y="768" width="136" height="96" rx="6" fill="#ffffff" stroke="#b45309" stroke-width="1.5"/>
  <text x="592" y="792" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">PA-4 Cl₂ dosing</text>
  <text x="592" y="810" font-size="11" fill="#475569" text-anchor="middle">4 PLCs</text>
  <text x="592" y="830" font-size="9.5" fill="#92400e" text-anchor="middle">hardwired safety interlocks</text>
  <text x="592" y="843" font-size="9.5" fill="#92400e" text-anchor="middle">(independent of network)</text>
  <rect x="672" y="768" width="136" height="96" rx="6" fill="#ffffff" stroke="#059669"/>
  <text x="740" y="792" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">PA-5 Clear well /</text>
  <text x="740" y="808" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">high-lift</text>
  <text x="740" y="828" font-size="11" fill="#475569" text-anchor="middle">4 PLCs</text>

  <!-- L0 band -->
  <rect x="60" y="920" width="760" height="70" rx="10" fill="#f4f4f5" stroke="#71717a"/>
  <text x="440" y="950" font-size="13" font-weight="bold" fill="#3f3f46" text-anchor="middle">Level 0 · Sensors &amp; actuators</text>
  <text x="440" y="970" font-size="11.5" fill="#52525b" text-anchor="middle">Profinet device segments (unrouted) · hardwired I/O per process area</text>

  <!-- PA -> L0 arrows -->
  <line x1="148" y1="864" x2="148" y2="918" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="296" y1="864" x2="296" y2="918" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="864" x2="444" y2="918" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="592" y1="864" x2="592" y2="918" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="864" x2="740" y2="918" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right column: 4G + PA-6 -->
  <ellipse cx="955" cy="560" rx="110" ry="46" fill="#eff6ff" stroke="#2563eb"/>
  <text x="955" y="556" font-size="12.5" font-weight="bold" fill="#1e3a8a" text-anchor="middle">4G cellular VPN</text>
  <text x="955" y="574" font-size="10.5" fill="#3b5bdb" text-anchor="middle">carrier network</text>

  <rect x="845" y="660" width="220" height="220" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="955" y="690" font-size="13" font-weight="bold" fill="#1e3a8a" text-anchor="middle">PA-6 · Distribution</text>
  <text x="955" y="708" font-size="13" font-weight="bold" fill="#1e3a8a" text-anchor="middle">telemetry</text>
  <text x="955" y="736" font-size="12" fill="#1e293b" text-anchor="middle">13 × RTU / S7-1200</text>
  <text x="955" y="762" font-size="11.5" fill="#334155" text-anchor="middle">9 pumping stations</text>
  <text x="955" y="782" font-size="11.5" fill="#334155" text-anchor="middle">4 elevated reservoirs</text>
  <text x="955" y="802" font-size="10.5" fill="#64748b" text-anchor="middle">(hypochlorite re-dosing)</text>
  <text x="955" y="836" font-size="10.5" fill="#64748b" text-anchor="middle">geographically dispersed,</text>
  <text x="955" y="852" font-size="10.5" fill="#64748b" text-anchor="middle">unmanned sites</text>

  <line x1="955" y1="660" x2="955" y2="608" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M 955 514 L 955 300 L 696 300" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="968" y="420" font-size="11" font-weight="bold" fill="#b45309">AO-2: telemetry terminates</text>
  <text x="968" y="436" font-size="11" font-weight="bold" fill="#b45309">directly inside the flat</text>
  <text x="968" y="452" font-size="11" font-weight="bold" fill="#b45309">plant control LAN</text>

  <!-- AO summary strip -->
  <rect x="60" y="1020" width="1005" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="76" y="1044" font-size="13" font-weight="bold" fill="#0f172a">Architectural observations — detailed in reference-architecture.md, risk-rated in the IEC 62443-3-2 assessment</text>
  <text x="76" y="1068" font-size="11.5" fill="#334155"><tspan font-weight="bold" fill="#dc2626">AO-1</tspan>  No OT DMZ (Level 3.5 absent); process historian dual-homed across the IT/OT boundary</text>
  <text x="76" y="1090" font-size="11.5" fill="#334155"><tspan font-weight="bold" fill="#dc2626">AO-2</tspan>  Flat Level 2/3 segment; remote telemetry VPN terminates directly inside the plant control LAN</text>
  <text x="76" y="1112" font-size="11.5" fill="#334155"><tspan font-weight="bold" fill="#dc2626">AO-3</tspan>  Vendor remote access via shared credential, standing (always-on), no multi-factor authentication</text>
  <text x="76" y="1134" font-size="11.5" fill="#334155"><tspan font-weight="bold" fill="#dc2626">AO-4</tspan>  Two HMI panels on Windows 7; patching locked pending vendor requalification</text>
  <text x="76" y="1156" font-size="11.5" fill="#334155"><tspan font-weight="bold" fill="#dc2626">AO-5</tspan>  Engineering workstation (PLC programming authority) dual-used for email and web browsing</text>

  <!-- Footer -->
  <text x="60" y="1210" font-size="11" fill="#94a3b8">Fictional scenario — Aguas de Valdenor, S.A. · Current state, July 2026 · Part of the ot-security-assessment portfolio case study · No real client data.</text>
</svg>
